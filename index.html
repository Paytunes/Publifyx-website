    <!-- Inline critical CSS: prevents FOUC while async CSS loads -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{-webkit-text-size-adjust:100%}
      body{margin:0;font-family:"Inter",system-ui,-apple-system,sans-serif;background:#0f172a;color:#f8fafc;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh;display:flex;flex-direction:column}
      /* Stable nav placeholder prevents layout shift before header paints */
      header{position:fixed;top:0;left:0;right:0;height:72px;z-index:50;background:rgba(15,23,42,0.95)}
      /* Hero section placeholder — matches the dark hero background */
      .hero-critical{min-height:90vh;display:flex;align-items:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#1e3a5f 100%)}
      /* Prevent invisible text flicker while webfont swaps */
      h1,h2,h3,h4,h5,h6{font-family:"Plus Jakarta Sans","Inter",system-ui,sans-serif;color:#f8fafc;line-height:1.15}
      /* Buttons keep shape before full CSS lands */

      /* Stop images from blowing out layout before CSS clamps them */
